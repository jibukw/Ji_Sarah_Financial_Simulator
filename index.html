<head>

<title>Ji & Sarah 학자금 대출 상환 시뮬레이터</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f9f3eb;color:#333;-webkit-font-smoothing:antialiased}
input[type="range"]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#e8ddd0;outline:none}

input[type="range"]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#b85c38;cursor:pointer;border:2px solid #fff}

input[type="number"]:focus,input[type="text"]:focus{border-color:#b85c38}

table{border-collapse:collapse}

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo}=React;

const LOANS=[
  {id:"1-01",principal:43392.82,rate:6.84},
  {id:"1-02",principal:44291.93,rate:6.31},
  {id:"1-03",principal:49079.48,rate:7.0},
  {id:"1-06",principal:33142.48,rate:7.08},
];
const TOTAL_P=LOANS.reduce((a,l)=>a+l.principal,0);
const J=n=>"¥"+Math.round(n).toLocaleString("ja-JP");
const D=n=>"$"+Math.round(n).toLocaleString("en-US");
const BY=2027;const MX=15;

function minPay(bal,rate){const r=rate/100/12;if(bal<=0)return 0;return Math.max(50,(bal*r*Math.pow(1+r,300))/(Math.pow(1+r,300)-1));}
function applyLump(bs,amt,strat){
  let rem=amt;const ord=strat==="avalanche"?[...bs].sort((a,b)=>b.rate-a.rate):[...bs].sort((a,b)=>a.bal-b.bal);
  for(const t of ord){if(rem<=0)break;const b=bs.find(x=>x.id===t.id);if(b.bal<=0)continue;const p=Math.min(rem,b.bal);b.bal-=p;rem-=p;}
  return bs;
}

function simulate({plans,lumpSum,lumpSumMonth,strategy,fx,autoPay,monthlySave,initSavings,planChangeMonth,newMinPayUSD,gradRate}){
  const rateDisc=autoPay?0.25:0;
  const gr=gradRate||0; // graduated increase % every 2 years
  let bs=LOANS.map(l=>({...l,bal:l.principal,effRate:Math.max(0,l.rate-rateDisc)}));
  const tl=[];const ys=[];let totInt=0;let mo=0;let savings=initSavings||0;
  const saveTarget=monthlySave||0;
  const pcm=planChangeMonth||0;
  const newMin=newMinPayUSD||0;

  if(lumpSum>0&&lumpSumMonth===0)bs=applyLump(bs,lumpSum,strategy);

  for(let yr=0;yr<MX;yr++){
    const p=plans[yr]||plans[plans.length-1];
    // Graduated increase: every 2 years, min payment goes up by gr%
    const gradMultiplier=Math.pow(1+gr/100,Math.floor(yr/2));
    const gradMinUSD=Math.round(1003.73*gradMultiplier);
    const baseMinUSD=pcm>0&&(yr*12>=pcm)?newMin:gradMinUSD;
    const loanJPY=Math.round(baseMinUSD*fx);
    const surpBeforeSave=p.ji+p.sarah-p.living-loanJPY-(p.baby||0);
    const actualSaveJPY=surpBeforeSave>=saveTarget?saveTarget:Math.max(0,surpBeforeSave);
    const surp=surpBeforeSave-actualSaveJPY;
    const extraUSD=Math.max(0,surp/fx);
    const sBal=bs.reduce((a,c)=>a+Math.max(0,c.bal),0);
    let yInt=0;let yPrin=0;let ySaved=0;

    // Determine strategy phase
    let phase=1;
    if(surpBeforeSave<0)phase=1;
    else if(extraUSD<200)phase=2;
    else if(extraUSD>=200&&extraUSD<600)phase=3;
    else phase=4;

    for(let m=0;m<12;m++){
      mo++;if(bs.every(b=>b.bal<0.01))break;
      if(lumpSum>0&&lumpSumMonth===mo)bs=applyLump(bs,lumpSum,strategy);
      const mSave=actualSaveJPY/fx;
      savings+=mSave;
      ySaved+=mSave;
      let mI=0;
      for(const b of bs){if(b.bal<=0)continue;const i=(b.bal*(b.effRate/100))/12;mI+=i;b.bal+=i;}
      if(pcm>0&&mo>=pcm&&newMin>0){
        const totalBal=bs.reduce((a,c)=>a+Math.max(0,c.bal),0);
        for(const b of bs){if(b.bal<=0)continue;const share=(b.bal/totalBal)*newMin;const a=Math.min(share,b.bal);b.bal-=a;yPrin+=a;}
      }else{
        // Use graduated min payment
        const totalBal=bs.reduce((a,c)=>a+Math.max(0,c.bal),0);
        for(const b of bs){
          if(b.bal<=0)continue;
          const share=(b.bal/totalBal)*gradMinUSD;
          const a=Math.min(share,b.bal);
          b.bal-=a;yPrin+=a;
        }
      }
      let ext=extraUSD;
      if(ext>0){const ord=strategy==="avalanche"?[...bs].sort((a,b)=>b.effRate-a.effRate):[...bs].sort((a,b)=>a.bal-b.bal);
        for(const t of ord){if(ext<=0)break;const b=bs.find(x=>x.id===t.id);if(b.bal<=0)continue;const pp=Math.min(ext,b.bal);b.bal-=pp;ext-=pp;yPrin+=pp;}}
      totInt+=mI;yInt+=mI;
      const tb=bs.reduce((a,c)=>a+Math.max(0,c.bal),0);
      tl.push({month:mo,totalBalance:tb,interest:mI,principal:yPrin/(m+1),totalInterestPaid:totInt,savings,
        balances:bs.map(b=>({id:b.id,balance:Math.max(0,b.bal)}))});
      if(tb<0.01)break;
    }

    const eBal=bs.reduce((a,c)=>a+Math.max(0,c.bal),0);
    const po=LOANS.filter(l=>{const prev=yr>0?ys[yr-1]?.loanBals?.find(x=>x.id===l.id)?.bal:l.principal;
      const now=bs.find(x=>x.id===l.id)?.bal||0;return(prev>1&&now<1);}).map(l=>l.id);

    ys.push({year:BY+yr,ji:p.ji,sarah:p.sarah,living:p.living,baby:p.baby||0,events:p.events||"",
      totalIncome:p.ji+p.sarah,surplusBeforeSave:surpBeforeSave,actualSaveJPY,surplusJPY:surp,extraUSD,
      yearInterest:yInt,yearPrincipal:yPrin,phase,
      startBal:sBal,endBal:eBal,paidOff:po,savings,yearSaved:ySaved,minPayUSD:baseMinUSD,
      loanBals:bs.map(b=>({id:b.id,bal:Math.max(0,b.bal)}))});
    if(eBal<0.01)break;
  }
  return{timeline:tl,totalInterestPaid:totInt,monthsToPayoff:mo,yearSummaries:ys};
}

const thS={padding:"8px 4px",textAlign:"left",fontWeight:700,fontSize:11,color:"#b85c38",whiteSpace:"nowrap"};
const tdS={padding:"6px 4px",verticalAlign:"middle"};
const nI={width:85};
const btn={padding:"8px 16px",borderRadius:8,border:"none",fontSize:12,fontWeight:600,cursor:"pointer"};

function Tab({active,onClick,children}){return <button onClick={onClick} style={{padding:"11px 14px",border:"none",
  borderBottom:active?"3px solid #b85c38":"3px solid transparent",background:active?"rgba(184,92,56,.08)":"transparent",
  color:active?"#b85c38":"#666",fontWeight:active?700:500,cursor:"pointer",fontSize:13,whiteSpace:"nowrap",
  display:"flex",alignItems:"center",gap:6}}>{children}</button>;}

const IC={s:16};
function IcoCalendar({active}){const c=active?"#b85c38":"#999";return <svg width={IC.s} height={IC.s} viewBox="0 0 22 24" fill="none" style={{flexShrink:0}}>
  <rect x="0" y="3" width="22" height="20" rx="3" stroke={c} strokeWidth="1.5"/>
  <line x1="0" y1="9" x2="22" y2="9" stroke={c} strokeWidth="1.5"/>
  <line x1="6" y1="0" x2="6" y2="6" stroke={c} strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="16" y1="0" x2="16" y2="6" stroke={c} strokeWidth="1.5" strokeLinecap="round"/>
  <circle cx="8" cy="16" r="1.5" fill={c}/><circle cx="14" cy="16" r="1.5" fill={c}/>
</svg>;}
function IcoClipboard({active}){const c=active?"#b85c38":"#999";return <svg width={IC.s} height={IC.s} viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}>
  <rect x="3" y="1" width="18" height="22" rx="2" stroke={c} strokeWidth="1.5"/>
  <rect x="7" y="-1" width="10" height="5" rx="1.5" stroke={c} strokeWidth="1.5"/>
  <line x1="8" y1="11" x2="18" y2="11" stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
  <line x1="8" y1="15" x2="16" y2="15" stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
  <line x1="8" y1="19" x2="13" y2="19" stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
</svg>;}
function IcoCompare({active}){const c=active?"#b85c38":"#999";return <svg width={IC.s} height={IC.s} viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}>
  <path d="M2 8L10 2L18 8" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  <path d="M6 16L14 22L22 16" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  <line x1="10" y1="2" x2="10" y2="18" stroke={c} strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="14" y1="6" x2="14" y2="22" stroke={c} strokeWidth="1.5" strokeLinecap="round"/>
</svg>;}
function IcoChart({active}){const c=active?"#b85c38":"#999";return <svg width={IC.s} height={IC.s} viewBox="0 0 22 24" fill="none" style={{flexShrink:0}}>
  <rect x="1" y="14" width="5" height="10" rx="1" fill={c}/>
  <rect x="8" y="8" width="5" height="16" rx="1" fill={c} opacity="0.7"/>
  <rect x="15" y="2" width="5" height="22" rx="1" fill={c} opacity="0.5"/>
</svg>;}
function IcoCoin(){return <svg width="14" height="14" viewBox="0 0 20 20" fill="none" style={{display:"inline",verticalAlign:"middle",marginRight:3}}>
  <circle cx="10" cy="10" r="8.5" stroke="#b85c38" strokeWidth="1.5"/>
  <text x="10" y="14" textAnchor="middle" style={{fontSize:"11px",fontWeight:600,fill:"#b85c38",fontFamily:"sans-serif"}}>$</text>
</svg>;}
function IcoGear(){return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{display:"inline",verticalAlign:"middle",marginRight:4}}>
  <circle cx="12" cy="12" r="3.5" stroke="#b85c38" strokeWidth="1.5"/>
  <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" stroke="#b85c38" strokeWidth="1.5" strokeLinecap="round"/>
</svg>;}
function IcoTrend(){return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{display:"inline",verticalAlign:"middle",marginRight:4}}>
  <polyline points="3,18 9,12 13,15 21,6" stroke="#b85c38" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  <polyline points="16,6 21,6 21,11" stroke="#b85c38" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
</svg>;}
function IcoBook(){return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{display:"inline",verticalAlign:"middle",marginRight:4}}>
  <path d="M2 4c2-1 5-1.5 10 0v17c-5-1.5-8-1-10 0V4z" stroke="#b85c38" strokeWidth="1.5" strokeLinejoin="round"/>
  <path d="M22 4c-2-1-5-1.5-10 0v17c5-1.5 8-1 10 0V4z" stroke="#b85c38" strokeWidth="1.5" strokeLinejoin="round"/>
</svg>;}
function IcoBulb(){return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{display:"inline",verticalAlign:"middle",marginRight:4}}>
  <path d="M9 21h6M12 3a7 7 0 00-4 12.7V18h8v-2.3A7 7 0 0012 3z" stroke="#b85c38" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
</svg>;}
function Card({title,children,accent}){return <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",
  borderLeft:accent?`4px solid ${accent}`:"none",boxShadow:"0 1px 6px rgba(0,0,0,.05)"}}>
  {title&&<h3 style={{margin:"0 0 14px",fontSize:15,color:"#b85c38",fontWeight:700,display:"flex",alignItems:"center",gap:6}}>{title}</h3>}{children}</div>;}
function Stat({label,value,sub,color}){return <div style={{textAlign:"center",padding:"4px 0"}}>
  <div style={{fontSize:11,color:"#888",marginBottom:4,fontWeight:500}}>{label}</div>
  <div style={{fontSize:20,fontWeight:800,color:color||"#b85c38",letterSpacing:"-.5px"}}>{value}</div>
  {sub&&<div style={{fontSize:10,color:"#aaa",marginTop:2}}>{sub}</div>}</div>;}
function InputRow({label,value,onChange,unit,min,max,step,sublabel}){return <div style={{marginBottom:16}}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
    <label style={{fontSize:13,color:"#444",fontWeight:500}}>{label}</label>
    <span style={{fontSize:14,fontWeight:700,color:"#b85c38"}}>{unit==="¥"?J(value):unit==="$"?D(value):`${value}${unit||""}`}</span></div>
  {sublabel&&<div style={{fontSize:11,color:"#888",marginBottom:4}}>{sublabel}</div>}
  <input type="range" min={min} max={max} step={step||1} value={value} onChange={e=>onChange(Number(e.target.value))} style={{width:"100%"}}/></div>;}

function MoneyInput({value,onChange}){
  const[editing,setEditing]=useState(false);
  const[raw,setRaw]=useState("");
  const startEdit=()=>{setRaw(String(value));setEditing(true);};
  const endEdit=()=>{const num=Number(raw.replace(/[^0-9.-]/g,""))||0;onChange(num);setEditing(false);};
  const onKey=(e)=>{if(e.key==="Enter")e.target.blur();};
  return editing
    ?<input type="text" value={raw} onChange={e=>setRaw(e.target.value)} onBlur={endEdit} onKeyDown={onKey} autoFocus
      style={{width:"100%",padding:"8px 10px",border:"1px solid #b85c38",borderRadius:6,fontSize:13,textAlign:"right"}}/>
    :<div onClick={startEdit} style={{width:"100%",padding:"8px 10px",border:"1px solid #ddd",borderRadius:6,fontSize:13,
      textAlign:"right",cursor:"text",background:"#fff"}}>
      {Math.round(value).toLocaleString()}</div>;
}

function MoneyCell({value,onChange,fx,cur,w}){
  // value is always stored in JPY internally
  const[editing,setEditing]=useState(false);
  const[raw,setRaw]=useState("");
  const displayVal=cur==="usd"?Math.round(value/fx):Math.round(value);
  const convVal=cur==="usd"?J(value):D(value/fx);
  const formatted=displayVal.toLocaleString();

  const startEdit=()=>{setRaw(String(displayVal));setEditing(true);};
  const endEdit=()=>{
    const cleaned=raw.replace(/[^0-9.-]/g,"");
    const num=Number(cleaned)||0;
    const jpyVal=cur==="usd"?Math.round(num*fx):num;
    onChange(jpyVal);
    setEditing(false);
  };
  const onKey=(e)=>{if(e.key==="Enter")e.target.blur();};

  return <td style={tdS}>
    <div style={{position:"relative"}}>
      {editing?
        <input type="text" value={raw} onChange={e=>setRaw(e.target.value)}
          onBlur={endEdit} onKeyDown={onKey} autoFocus
          style={{...nI,width:w||90,textAlign:"right"}}/>:
        <div onClick={startEdit} style={{...nI,width:w||90,padding:"6px 8px",border:"1px solid #ddd",
          borderRadius:6,cursor:"text",textAlign:"right",background:"#fff",fontSize:12,
          whiteSpace:"nowrap",overflow:"hidden",minHeight:28}}>
          {formatted}
        </div>}
      <div style={{fontSize:9,color:"#aaa",marginTop:2,textAlign:"right"}}>{convVal}</div>
    </div>
  </td>;
}

function YearTable({plans,setPlans,ko,fx,monthlySave,gradRate}){
  const[cur,setCur]=useState("jpy");
  const[expandedRow,setExpandedRow]=useState(null);
  const up=(i,f,v)=>{const n=[...plans];n[i]={...n[i],[f]:v};setPlans(n);};
  const add=()=>{if(plans.length>=MX)return;const l=plans[plans.length-1];setPlans([...plans,{...l,events:""}]);};
  const rm=()=>{if(plans.length>1)setPlans(plans.slice(0,-1));};
  const sym=cur==="jpy"?"¥":"$";
  const gr=gradRate||0;

  return <div>
    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10,gap:4}}>
      <span style={{fontSize:12,color:"#888",alignSelf:"center",marginRight:4}}>{ko?"입력 통화":"Currency"}:</span>
      {["jpy","usd"].map(c=><button key={c} onClick={()=>setCur(c)} style={{
        padding:"5px 14px",borderRadius:6,border:cur===c?"2px solid #b85c38":"1px solid #ddd",
        background:cur===c?"#faf0e6":"#fff",color:cur===c?"#b85c38":"#888",
        fontWeight:cur===c?700:400,fontSize:12,cursor:"pointer"}}>
        {c==="jpy"?"¥ JPY":"$ USD"}</button>)}
    </div>
    <div style={{overflowX:"auto",marginBottom:12,WebkitOverflowScrolling:"touch"}}>
      <table style={{width:"100%",fontSize:12,minWidth:660}}>
        <thead><tr style={{borderBottom:"2px solid #b85c38",background:"#faf6f0"}}>
          <th style={thS}>{ko?"연도":"Year"}</th>
          <th style={thS}>Ji {sym}</th>
          <th style={thS}>Sarah {sym}</th>
          <th style={thS}>{ko?"생활비":"Living"} {sym}</th>
          <th style={thS}>{ko?"육아":"Baby"} {sym}</th>
          <th style={{...thS,minWidth:110}}>{ko?"메모":"Notes"}</th>
          <th style={thS}>{ko?"여유분":"Surplus"} <span style={{fontSize:9,cursor:"pointer"}} title={ko?"계산식 보기: 클릭":"Click for formula"}>ⓘ</span></th>
        </tr></thead>
        <tbody>{plans.map((p,i)=>{
          const gradMul=Math.pow(1+gr/100,Math.floor(i/2));
          const gradMinUSD=Math.round(1003.73*gradMul);
          const loanJPY=Math.round(gradMinUSD*fx);
          const surpBeforeSave=p.ji+p.sarah-p.living-loanJPY-(p.baby||0);
          const actualSave=surpBeforeSave>=monthlySave?monthlySave:Math.max(0,surpBeforeSave);
          const surplus=surpBeforeSave-actualSave;
          const isDeficit=surpBeforeSave<0;
          const isExpanded=expandedRow===i;
          return <React.Fragment key={i}>
            <tr style={{borderBottom:isExpanded?"none":"1px solid #eee",background:isDeficit?"#fdf8f8":"",verticalAlign:"top"}}>
              <td style={{...tdS,fontWeight:700,color:"#b85c38",fontSize:13,paddingTop:12}}>{BY+i}</td>
              <MoneyCell value={p.ji} onChange={v=>up(i,"ji",v)} fx={fx} cur={cur}/>
              <MoneyCell value={p.sarah} onChange={v=>up(i,"sarah",v)} fx={fx} cur={cur}/>
              <MoneyCell value={p.living} onChange={v=>up(i,"living",v)} fx={fx} cur={cur}/>
              <MoneyCell value={p.baby||0} onChange={v=>up(i,"baby",v)} fx={fx} cur={cur} w={75}/>
              <td style={{...tdS,verticalAlign:"top",paddingTop:8}}><div>
                <input type="text" value={p.events||""} placeholder={ko?"예: 이직":"e.g. new job"}
                onChange={e=>up(i,"events",e.target.value)} style={{...nI,width:"100%",minWidth:90}}/>
                <div style={{height:14}}></div>
              </div></td>
              <td style={{...tdS,fontWeight:700,color:isDeficit?"#c0392b":surplus>0?"#27ae60":"#e67e22",fontSize:12,whiteSpace:"nowrap",cursor:"pointer",paddingTop:10}}
                onClick={()=>setExpandedRow(isExpanded?null:i)}>
                {isDeficit?<>{J(surpBeforeSave)}<br/><span style={{fontSize:10,color:"#c0392b",fontWeight:400}}>{ko?"적자":"deficit"} {isExpanded?"▲":"▼"}</span></>
                  :<>{J(surplus)}<br/><span style={{fontSize:10,color:"#999",fontWeight:400}}>{D(surplus/fx)} {isExpanded?"▲":"▼"}</span></>}
              </td>
            </tr>
            {isExpanded&&<tr style={{borderBottom:"1px solid #eee"}}>
              <td colSpan={7} style={{padding:"10px 14px",background:"#faf6f0"}}>
                <div style={{fontSize:11,color:"#555",lineHeight:1.9}}>
                  <strong style={{color:"#b85c38"}}>{ko?"계산식":"Formula"}:</strong><br/>
                  <span style={{color:"#27ae60"}}>+</span> Ji {J(p.ji)} <span style={{color:"#aaa"}}>({D(p.ji/fx)})</span><br/>
                  <span style={{color:"#27ae60"}}>+</span> Sarah {J(p.sarah)} <span style={{color:"#aaa"}}>({D(p.sarah/fx)})</span><br/>
                  <span style={{color:"#c0392b"}}>−</span> {ko?"생활비":"Living"} {J(p.living)}<br/>
                  <span style={{color:"#c0392b"}}>−</span> {ko?"대출 최소납부":"Loan min. payment"} {J(loanJPY)} <span style={{color:"#aaa"}}>({D(gradMinUSD)}/월{gr>0&&i>0?` — Graduated ${Math.floor(i/2)+1}단계`:""})</span><br/>
                  {(p.baby||0)>0&&<><span style={{color:"#c0392b"}}>−</span> {ko?"육아비":"Baby"} {J(p.baby)}<br/></>}

}

function ResultTable({ys,ko,fx}){
  if(!ys.length)return null;
  return <div>
    <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
      <table style={{width:"100%",fontSize:12,minWidth:720}}>
        <thead><tr style={{borderBottom:"2px solid #b85c38",background:"#faf6f0"}}>
          <th style={thS}>{ko?"연도":"Year"}</th>
          <th style={thS}>{ko?"연초 잔액":"Start"}</th>
          <th style={thS}>{ko?"이자":"Interest"}</th>
          <th style={thS}>{ko?"원금 상환":"Principal"}</th>
          <th style={thS}>{ko?"연말 잔액":"End"}</th>
          <th style={thS}>{ko?"완납":"Paid Off"}</th>
          <th style={{...thS,minWidth:160}}>{ko?"왜 이렇게 됐나":"Why"}</th>
        </tr></thead>
        <tbody>{ys.map((y,i)=>{
          const red=y.startBal-y.endBal;const pct=y.startBal>0?((red/y.startBal)*100).toFixed(1):0;
          const good=red>y.yearInterest;
          const why=[];
          // Strategy phase label
          const phaseLabels=ko?{1:"🔹 1단계: 버티기",2:"🔸 2단계: 안정",3:"🟠 3단계: 공격",4:"🟢 4단계: 제거"}
            :{1:"🔹 Phase 1: Survive",2:"🔸 Phase 2: Stable",3:"🟠 Phase 3: Attack",4:"🟢 Phase 4: Eliminate"};
          const phaseColors={1:"#c0392b",2:"#e67e22",3:"#d4845a",4:"#27ae60"};
          why.push(`<phase>${phaseLabels[y.phase]||phaseLabels[1]}`);
          // Income situation
          if(y.sarah===0)why.push(ko?"Sarah 무소득":"Sarah no income");
          else if(y.sarah>=300000)why.push(ko?`Sarah ${J(y.sarah)} → 적극상환 가능`:`Sarah ${J(y.sarah)} → extra repay`);
          else why.push(ko?`Sarah ${J(y.sarah)}`:`Sarah ${J(y.sarah)}`);
          if(y.baby>0)why.push(ko?`육아비 ${J(y.baby)}`:`Baby ${J(y.baby)}`);
          // Deficit or surplus
          const sbSave=y.surplusBeforeSave;
          if(sbSave<0){
            why.push(ko?`▲ 적자 ${J(sbSave)}/월 → 저축·추가상환 불가`:`▲ Deficit ${J(sbSave)}/mo → no save/extra`);
            why.push(ko?`▸ 최소납부 ${D(y.minPayUSD)}/월만 진행`:`▸ Min. payment ${D(y.minPayUSD)}/mo only`);
          }else if(y.extraUSD>100){
            why.push(ko?`월 ${D(y.extraUSD)} 추가상환`:`${D(y.extraUSD)}/mo extra repay`);
            why.push(ko?`▸ 최소납부 ${D(y.minPayUSD)}/월 + 추가분`:`▸ Min. ${D(y.minPayUSD)}/mo + extra`);
          }else{
            why.push(ko?`▸ 최소납부 ${D(y.minPayUSD)}/월만 진행 (여유 적음)`:`▸ Min. ${D(y.minPayUSD)}/mo only (tight)`);
          }
          // Plan change
          if(y.minPayUSD&&y.minPayUSD!==1003.73)why.push(ko?`▸ 플랜변경 → 월 ${D(y.minPayUSD)}`:`▸ Plan → ${D(y.minPayUSD)}/mo`);
          // Savings (only show if actually saved)
          if(y.yearSaved>0)why.push(ko?`● 저축 +${D(y.yearSaved)}(${J(y.yearSaved*fx)}) 누적 ${D(y.savings)}(${J(y.savings*fx)})`:`● Saved +${D(y.yearSaved)}(${J(y.yearSaved*fx)}) cum. ${D(y.savings)}(${J(y.savings*fx)})`);
          else if(sbSave<0&&i===0)why.push(ko?"● 저축 불가 (적자)":"● Can't save (deficit)");
          // Events
          if(y.paidOff.length>0)why.push(`★ ${y.paidOff.join(", ")}`);
          if(y.events)why.push(`▸ ${y.events}`);
          if(y.endBal<1)why.push(ko?"★ 완납!":"★ Done!");

          return <tr key={i} style={{borderBottom:"1px solid #eee",background:y.endBal<1?"#eafaf1":y.surplusJPY<0?"#fdf0e8":""}}>
            <td style={{...tdS,fontWeight:700,color:"#b85c38"}}>{y.year}</td>
            <td style={{...tdS,fontWeight:600}}>{D(y.startBal)}<br/><span style={{fontSize:9,color:"#aaa"}}>{J(y.startBal*fx)}</span></td>
            <td style={{...tdS,color:"#c0392b"}}>{D(y.yearInterest)}<br/><span style={{fontSize:9,color:"#caa"}}>{J(y.yearInterest*fx)}</span></td>
            <td style={{...tdS,color:"#27ae60",fontWeight:600}}>{D(y.yearPrincipal)}<br/><span style={{fontSize:9,color:"#8c8"}}>{J(y.yearPrincipal*fx)}</span></td>
            <td style={{...tdS,fontWeight:700}}>
              {D(y.endBal)}<br/>
              <span style={{fontSize:9,color:"#aaa"}}>{J(y.endBal*fx)}</span><br/>
              <span style={{fontSize:10,color:good?"#27ae60":"#e67e22"}}>{red>=0?`▼${pct}%`:`▲${Math.abs(pct)}%`}</span>
            </td>
            <td style={tdS}>{y.paidOff.length>0?
              <span style={{background:"#27ae60",color:"#fff",padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:700}}>{y.paidOff.join(", ")}</span>:
              <span style={{color:"#ccc"}}>—</span>}</td>
            <td style={{...tdS,fontSize:11,lineHeight:1.5}}>{why.map((w,j)=>{
              if(typeof w==="string"&&w.startsWith("<phase>")){
                const phaseText=w.replace("<phase>","");
                const pc=y.phase===1?"#c0392b":y.phase===2?"#e67e22":y.phase===3?"#d4845a":"#27ae60";
                return <div key={j} style={{background:pc,color:"#fff",padding:"2px 8px",borderRadius:4,fontSize:10,
                  fontWeight:700,display:"inline-block",marginBottom:4}}>{phaseText}</div>;
              }
              return <div key={j}>{w}</div>;
            })}</td>
          </tr>;})}</tbody>
        <tfoot><tr style={{borderTop:"2px solid #b85c38",fontWeight:700,background:"#faf6f0"}}>
          <td style={tdS}>{ko?"합계":"Total"}</td>
          <td style={tdS}>{D(TOTAL_P)}<br/><span style={{fontSize:9,color:"#aaa",fontWeight:400}}>{J(TOTAL_P*fx)}</span></td>
          <td style={{...tdS,color:"#c0392b"}}>{D(ys.reduce((a,y)=>a+y.yearInterest,0))}<br/><span style={{fontSize:9,color:"#caa",fontWeight:400}}>{J(ys.reduce((a,y)=>a+y.yearInterest,0)*fx)}</span></td>
          <td style={{...tdS,color:"#27ae60"}}>{D(ys.reduce((a,y)=>a+y.yearPrincipal,0))}<br/><span style={{fontSize:9,color:"#8c8",fontWeight:400}}>{J(ys.reduce((a,y)=>a+y.yearPrincipal,0)*fx)}</span></td>
          <td style={tdS}>{D(ys[ys.length-1]?.endBal||0)}<br/><span style={{fontSize:9,color:"#aaa",fontWeight:400}}>{J((ys[ys.length-1]?.endBal||0)*fx)}</span></td><td/><td/>
        </tr></tfoot>
      </table>
    </div>
  </div>;
}

    {ys.map((y,i)=>{
      const red=y.startBal-y.endBal;const pct=(red/TOTAL_P*100).toFixed(1);
      const cumPct=((TOTAL_P-y.endBal)/TOTAL_P*100).toFixed(1);

function BarChart({tl,ko}){
  if(!tl.length)return null;const mx=tl[0].totalBalance;const st=Math.max(1,Math.floor(tl.length/48));
  const bars=tl.filter((_,i)=>i%st===0||i===tl.length-1);
  return <div style={{padding:"12px 0"}}>
    <div style={{display:"flex",alignItems:"flex-end",height:140,gap:1}}>
      {bars.map((d,i)=>{const r=d.totalBalance/mx;const ir=d.interest/(d.interest+d.principal+.01);
        return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",height:"100%"}}>
          <div style={{flex:1}}/><div style={{width:"100%",height:`${r*100}%`,

      <span>0</span><span>{tl.length}{ko?"개월":"mo"} ({(tl.length/12).toFixed(1)}{ko?"년":"y"})</span></div>
  </div>;
}

function ScenarioBar({scenarios,ko}){
  const mx=Math.max(...scenarios.map(s=>s.months));
  return <div style={{display:"flex",flexDirection:"column",gap:12}}>
    {scenarios.map((s,i)=>{const y=(s.months/12).toFixed(1);const r=s.months/mx;

        <div style={{height:22,background:"#f0f0f0",borderRadius:10,overflow:"hidden"}}>

            display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:8}}>
            <span style={{fontSize:10,color:"#fff",fontWeight:700}}>{y}{ko?"년":"y"}</span></div></div>
      </div>;})}
  </div>;
}

    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,background:"#fff",
